<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Parfum"/>
  <title>Parfum — Monitor de Fragancias</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#C9A066;--gold-dim:rgba(201,160,102,.4);--gold-faint:rgba(201,160,102,.1);
      --bg:#080603;--bg2:rgba(255,255,255,.025);
      --text:#EDE3D0;--text-dim:rgba(237,227,208,.5);--text-faint:rgba(237,227,208,.25);
      --border:rgba(201,160,102,.18);--border-h:rgba(201,160,102,.45);
    }
    html{-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(201,160,102,.07) 0%,transparent 55%),
                 radial-gradient(ellipse 50% 60% at 85% 95%,rgba(120,75,30,.09) 0%,transparent 55%)}
    .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 18px}

    header{text-align:center;padding:calc(env(safe-area-inset-top,0px) + 44px) 16px 28px}
    .eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5em;color:var(--gold-dim);margin-bottom:14px}
    h1{font-size:clamp(40px,10vw,68px);font-weight:300;font-style:italic;line-height:1;letter-spacing:.06em;margin-bottom:12px;
      background:linear-gradient(135deg,#EDE3D0 0%,#C9A066 45%,#EDE3D0 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .rule{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 12px}
    .sub{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.35em;color:var(--text-faint)}

    .card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:22px 18px 20px;margin-bottom:26px;
          box-shadow:0 24px 70px rgba(0,0,0,.5),inset 0 1px 0 rgba(201,160,102,.07)}
    .search-row{display:flex;gap:8px;margin-bottom:16px}
    .search-input{flex:1;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:4px;
      padding:14px 15px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:17px;
      letter-spacing:.03em;outline:none;transition:border-color .3s;-webkit-appearance:none}
    .search-input:focus{border-color:var(--gold-dim)}
    .search-input::placeholder{color:var(--text-faint);font-style:italic}
    .btn-gold{padding:14px 18px;background:linear-gradient(135deg,#C9A066,#8B6530);border:none;border-radius:4px;
      color:#0A0603;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.18em;cursor:pointer;font-weight:600;white-space:nowrap}
    .btn-gold:active{opacity:.8;transform:scale(.97)}
    .btn-gold:disabled{opacity:.3;cursor:default}

    .or-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .or-line{flex:1;height:1px;background:var(--gold-faint)}
    .or-txt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.35em;color:rgba(201,160,102,.3)}

    .photo-btn{width:100%;padding:15px 12px;background:transparent;border:1px dashed rgba(201,160,102,.22);
      border-radius:4px;color:rgba(201,160,102,.6);font-family:'Cinzel',serif;font-size:9.5px;
      letter-spacing:.2em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px}
    .photo-btn:active{background:var(--gold-faint)}
    .photo-note{font-size:11px;color:var(--text-faint);text-align:center;margin-top:8px;font-style:italic}

    .preview-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
      border:1px solid rgba(201,160,102,.22);border-radius:4px;background:var(--gold-faint)}
    .preview-row img{width:46px;height:46px;object-fit:cover;border-radius:3px;border:1px solid var(--border)}
    .preview-row span{flex:1;font-size:12px;color:rgba(201,160,102,.7)}
    .x-btn{background:none;border:none;color:rgba(201,160,102,.4);cursor:pointer;font-size:22px;line-height:1;padding:4px 6px}

    .err{margin-top:12px;padding:12px 16px;background:rgba(160,60,60,.09);border:1px solid rgba(160,60,60,.3);
      border-radius:4px;color:#E08888;font-size:13px;text-align:center;line-height:1.65;display:none}

    #loading{text-align:center;padding:70px 20px;display:none}
    .spin{font-size:34px;color:var(--gold);display:inline-block;animation:spin 3.5s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-txt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;color:rgba(201,160,102,.5)}
    .load-step{font-size:13px;color:var(--text-faint);margin-top:10px;font-style:italic;min-height:20px}

    #results{display:none;animation:fadeUp .6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .source-badge{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;padding:3px 10px;
      background:rgba(201,160,102,.1);border:1px solid rgba(201,160,102,.3);border-radius:2px;color:rgba(201,160,102,.7)}

    .hero{display:flex;gap:18px;margin-bottom:22px;align-items:flex-start}
    .bottle{flex-shrink:0;width:105px;height:155px;background:rgba(255,255,255,.025);border:1px solid var(--border);
      border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .bottle img{width:100%;height:100%;object-fit:contain;padding:8px}
    .ph{font-size:38px;opacity:.18}
    .hero-info{flex:1;min-width:0;padding-top:2px}
    .brand-line{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.3em;color:rgba(201,160,102,.55);margin-bottom:5px}
    .perf-name{font-size:clamp(22px,5.5vw,36px);font-weight:300;font-style:italic;line-height:1.1;margin-bottom:9px}
    .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
    .tag{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.18em;padding:4px 10px;
      border:1px solid rgba(201,160,102,.28);border-radius:2px;color:var(--gold)}
    .desc{font-size:13px;line-height:1.75;color:var(--text-dim)}
    .frag-link{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-family:'Cinzel',serif;
      font-size:8px;letter-spacing:.18em;color:var(--gold-dim);text-decoration:none;
      border-bottom:1px solid rgba(201,160,102,.2);padding-bottom:2px}

    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:22px}
    .metric{background:var(--bg2);border:1px solid rgba(201,160,102,.1);border-radius:4px;padding:15px 10px;text-align:center}
    .m-icon{font-size:18px;color:var(--gold);margin-bottom:9px}
    .dots{display:flex;justify-content:center;gap:4px;margin-bottom:8px}
    .dot{width:9px;height:9px;border-radius:50%;background:rgba(201,160,102,.12)}
    .dot.on{background:var(--gold)}
    .m-lbl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.2em;color:rgba(201,160,102,.4)}

    .tabs{display:flex;border-bottom:1px solid rgba(201,160,102,.13);margin-bottom:20px}
    .tab{padding:12px 16px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;
      color:var(--text-faint);font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.2em;cursor:pointer;transition:all .3s}
    .tab.on{color:var(--gold);border-bottom-color:var(--gold)}
    .panel{display:none}.panel.on{display:block;animation:fadeUp .4s ease both}

    .pyr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .col{background:var(--bg2);border:1px solid rgba(201,160,102,.1);border-radius:4px;padding:17px 13px}
    .col-head{text-align:center;margin-bottom:14px}
    .col-ico{font-size:17px;margin-bottom:6px}
    .col-lbl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.2em;color:rgba(201,160,102,.38)}
    .nbar{margin-bottom:9px}
    .nbar-top{display:flex;justify-content:space-between;margin-bottom:4px}
    .nname{font-size:12px;color:var(--gold)}
    .npct{font-size:10px;color:var(--text-faint)}
    .ntrack{height:3px;background:rgba(201,160,102,.1);border-radius:2px;overflow:hidden}
    .nfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#C9A066,#F0D080);width:0;
      transition:width 1.1s cubic-bezier(.16,1,.3,1)}
    .empty-note{font-size:11px;color:var(--text-faint);font-style:italic;text-align:center;padding:8px 0}

    .plist{display:flex;flex-direction:column;gap:7px}
    .pitem{background:var(--bg2);border:1px solid rgba(201,160,102,.1);border-radius:4px;
      padding:15px 15px;display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:inherit}
    .pitem:active{background:rgba(201,160,102,.06)}
    .p-name{font-size:15px;margin-bottom:2px}
    .p-note{font-size:11px;color:var(--text-faint)}
    .parr{color:var(--gold-dim);font-size:15px}
    .price-foot{font-size:11px;color:var(--text-faint);margin-top:12px;text-align:center;font-style:italic;padding-bottom:8px}

    footer{text-align:center;padding:28px 20px calc(env(safe-area-inset-bottom,0px) + 28px);
      font-family:'Cinzel',serif;font-size:8px;letter-spacing:.3em;color:var(--text-faint)}

    @media(max-width:480px){
      .pyr{grid-template-columns:1fr}
      .hero{gap:14px}
      .bottle{width:88px;height:128px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Colección Personal</div>
    <h1>Parfum</h1>
    <div class="rule"></div>
    <div class="sub">Monitor de Fragancias</div>
  </header>

  <div class="card">
    <div class="search-row">
      <input class="search-input" type="text" id="q" placeholder="Nombre del perfume…"
             autocomplete="off" autocorrect="off" spellcheck="false"
             onkeydown="if(event.key==='Enter'){this.blur();go()}"/>
      <button class="btn-gold" id="sbtn" onclick="go()">BUSCAR</button>
    </div>
    <div class="or-row"><div class="or-line"></div><div class="or-txt">O</div><div class="or-line"></div></div>
    <div id="photo-zone">
      <button class="photo-btn" onclick="document.getElementById('fi').click()">
        <span style="font-size:22px">📷</span> FOTOGRAFIAR BOTELLA
      </button>
      <p class="photo-note">Apunta la cámara a la etiqueta del perfume</p>
    </div>
    <input id="fi" type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>
    <div id="err" class="err"></div>
  </div>

  <div id="loading">
    <div class="spin">✦</div>
    <p class="load-txt">BUSCANDO FRAGANCIA</p>
    <p class="load-step" id="step"></p>
  </div>

  <div id="results">
    <div class="hero">
      <div class="bottle" id="bottle"><span class="ph">🫙</span></div>
      <div class="hero-info">
        <div style="margin-bottom:8px"><span class="source-badge" id="source-badge"></span></div>
        <div class="brand-line" id="brand-line"></div>
        <div class="perf-name" id="pname"></div>
        <div class="tags" id="tags"></div>
        <div class="desc" id="pdesc"></div>
        <a id="frag-link" class="frag-link" href="#" target="_blank" rel="noopener">↗ &nbsp;Ver ficha completa</a>
      </div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="m-icon">⧗</div><div class="dots" id="d-lon"></div><div class="m-lbl">LONGEVIDAD</div></div>
      <div class="metric"><div class="m-icon">◈</div><div class="dots" id="d-sil"></div><div class="m-lbl">ESTELA</div></div>
      <div class="metric"><div class="m-icon">◉</div><div class="dots" id="d-int"></div><div class="m-lbl">INTENSIDAD</div></div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="swTab('pyr',this)">PIRÁMIDE OLFATIVA</button>
      <button class="tab" onclick="swTab('pri',this)">PRECIOS</button>
    </div>
    <div id="tab-pyr" class="panel on">
      <div class="pyr">
        <div class="col"><div class="col-head"><div class="col-ico" style="color:#EDE3D0">▲</div><div class="col-lbl">SALIDA</div></div><div id="n-top"></div></div>
        <div class="col"><div class="col-head"><div class="col-ico" style="color:#C9A066">◆</div><div class="col-lbl">CORAZÓN</div></div><div id="n-heart"></div></div>
        <div class="col"><div class="col-head"><div class="col-ico" style="color:#8B6530">▼</div><div class="col-lbl">FONDO</div></div><div id="n-base"></div></div>
      </div>
    </div>
    <div id="tab-pri" class="panel">
      <div class="plist" id="plist"></div>
      <p class="price-foot">Pulsa para buscar el precio actual en cada tienda</p>
    </div>
  </div>

  <footer>✦ &nbsp; Monitor de Fragancias &nbsp; ✦</footer>
</div>

<script>
// ── SOURCES ───────────────────────────────────────────────────────────────────
// Ordered list: first one that returns data wins
const SOURCES = [
  { name: "Fragrantica", search: q => `https://www.fragrantica.com/search/?query=${enc(q)}`,  findUrl: findFragranticaUrl,  parse: parseFragrantica },
  { name: "Parfumo",     search: q => `https://www.parfumo.net/search?q=${enc(q)}`,            findUrl: findParfumoUrl,      parse: parseParfumo },
  { name: "Basenotes",   search: q => `https://www.basenotes.net/search/?query=${enc(q)}`,     findUrl: findBasenotesUrl,    parse: parseBasenotes },
];

const enc = encodeURIComponent;
const PROXY = "/proxy?url=";

async function proxyGet(url) {
  const r = await fetch(PROXY + enc(url), { signal: AbortSignal.timeout(14000) });
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${await r.text()}`);
  return r.text();
}

// ── URL FINDERS ───────────────────────────────────────────────────────────────
function findFragranticaUrl(html) {
  const re = /https?:\/\/www\.fragrantica\.com\/perfume\/[^"'\s<>]+\d+\.html/g;
  for (const u of [...new Set(html.match(re)||[])]) {
    if (!u.includes("?")) return u;
  }
  const m = html.match(/href="(\/perfume\/[^"]+\d+\.html)"/);
  return m ? "https://www.fragrantica.com" + m[1] : null;
}

function findParfumoUrl(html) {
  const m = html.match(/href="(\/Perfumes\/[^"\/]+\/[^"\/]+)"/);
  return m ? "https://www.parfumo.net" + m[1] : null;
}

function findBasenotesUrl(html) {
  const m = html.match(/href="(https?:\/\/www\.basenotes\.net\/[^"]*fragrance[^"]*)"/i)
         || html.match(/href="(\/[^"]*fragrance[^"]*)"/i);
  if (!m) return null;
  return m[1].startsWith("http") ? m[1] : "https://www.basenotes.net" + m[1];
}

// ── PARSERS ───────────────────────────────────────────────────────────────────
function parseFragrantica(html, url) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const name  = doc.querySelector("h1[itemprop=name]")?.textContent?.trim() || doc.querySelector("h1")?.textContent?.trim() || "";
  const brand = doc.querySelector("[itemprop=brand] span")?.textContent?.trim() || "";
  const year  = (html.match(/\b(19[5-9]\d|20[0-2]\d)\b/)||[])[1] || "";
  let imgUrl  = doc.querySelector("meta[property='og:image']")?.content || doc.querySelector("img[itemprop=image]")?.getAttribute("src") || "";
  if (imgUrl.startsWith("/")) imgUrl = "https://www.fragrantica.com" + imgUrl;
  const desc  = doc.querySelector("[itemprop=description]")?.textContent?.trim().slice(0,280)
             || doc.querySelector("meta[name=description]")?.content?.trim().slice(0,280) || "";
  return {
    name, brand, year, imgUrl, desc,
    gender:   extractGender(html),
    season:   extractSeason(html),
    timeDay:  extractTime(html),
    longevity:ratingFromJson(html,"longevity")||3,
    sillage:  ratingFromJson(html,"sillage")||3,
    intensity:ratingFromJson(html,"intensity")||3,
    topNotes:   extractNotesFrag(html,"top"),
    heartNotes: extractNotesFrag(html,"middle"),
    baseNotes:  extractNotesFrag(html,"base"),
    url, source:"Fragrantica"
  };
}

function parseParfumo(html, url) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const name  = doc.querySelector("h1")?.textContent?.trim().replace(/\s+/g," ") || "";
  let brand = "";
  const bc = doc.querySelector("ol.breadcrumb, nav[aria-label=breadcrumb]");
  if (bc) { const items = bc.querySelectorAll("li"); if (items.length >= 2) brand = items[items.length-2].textContent.trim(); }
  if (!brand) { const m = url.match(/\/Perfumes\/([^/]+)\//); if (m) brand = m[1].replace(/-/g," "); }
  const year = (html.match(/\b(19[5-9]\d|20[0-2]\d)\b/)||[])[1] || "";
  let imgUrl = doc.querySelector("meta[property='og:image']")?.content || "";
  if (!imgUrl) { for (const img of doc.querySelectorAll("img")) { const s=img.src||img.getAttribute("src")||""; if (/perfume|bottle|flacon/i.test(s)){imgUrl=s;break;} } }
  if (imgUrl.startsWith("/")) imgUrl = "https://www.parfumo.net" + imgUrl;
  const desc = doc.querySelector("meta[name=description]")?.content?.trim().slice(0,280) || "";
  return {
    name, brand, year, imgUrl, desc,
    gender:   extractGender(html),
    season:   extractSeason(html),
    timeDay:  extractTime(html),
    longevity:ratingNearWord(html,"longevity|Haltbarkeit")||3,
    sillage:  ratingNearWord(html,"sillage|Sillage")||3,
    intensity:ratingNearWord(html,"intensity|Intensität")||3,
    topNotes:   extractNotesAlt(doc,html,"top"),
    heartNotes: extractNotesAlt(doc,html,"heart"),
    baseNotes:  extractNotesAlt(doc,html,"base"),
    url, source:"Parfumo"
  };
}

function parseBasenotes(html, url) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  let name  = doc.querySelector("h1")?.textContent?.trim() || "";
  let brand = "";
  if (/ by /i.test(name)) { const p=name.split(/ by /i); name=p[0].trim(); brand=p[1]?.trim()||""; }
  const imgUrl = doc.querySelector("meta[property='og:image']")?.content || "";
  const desc   = doc.querySelector("meta[name=description]")?.content?.trim().slice(0,280) || "";
  return {
    name, brand, year:"", imgUrl, desc,
    gender:"Unisex", season:["🌍 Todo el año"], timeDay:["🌤 Diurno","🌙 Nocturno"],
    longevity:3, sillage:3, intensity:3,
    topNotes:   extractNotesAlt(doc,html,"top"),
    heartNotes: extractNotesAlt(doc,html,"middle"),
    baseNotes:  extractNotesAlt(doc,html,"base"),
    url, source:"Basenotes"
  };
}

// ── NOTE EXTRACTORS ───────────────────────────────────────────────────────────
function extractNotesFrag(html, type) {
  const map = { top: /Top Notes?[\s\S]{0,1400}?(?=Middle|Heart|Base)/i, middle: /(?:Middle|Heart) Notes?[\s\S]{0,1400}?(?=Base)/i, base: /Base Notes?[\s\S]{0,1400}/i };
  const chunk = (html.match(map[type])||[""])[0];
  const alts = [...chunk.matchAll(/alt="([^"]{2,40})"/g)].map(m=>m[1]).filter(a=>!/fragrantica|logo|icon/i.test(a));
  return toNoteTuples(alts);
}

function extractNotesAlt(doc, html, type) {
  const heads = { top:/top|head|salida/i, heart:/heart|middle|corazón|coeur/i, base:/base|fond|fondo/i };
  const pat = heads[type];
  let names = [];
  // DOM approach
  for (const el of doc.querySelectorAll("h2,h3,h4,strong,b,div,li")) {
    const t = el.textContent.trim();
    if (pat.test(t) && t.length < 40) {
      const nxt = el.nextElementSibling || el.parentElement?.nextElementSibling;
      if (nxt) {
        nxt.querySelectorAll("li,span,a,div").forEach(n=>{
          const v=n.textContent.trim();
          if (v.length>1&&v.length<40&&/^[A-Za-zÀ-ÿ\s\-&']+$/.test(v)) names.push(v);
        });
      }
      if (names.length) break;
    }
  }
  // Regex fallback
  if (!names.length) {
    const chunkMap = { top:/(?:top|head)[^<]{0,40}notes?[\s\S]{0,1200}?(?=heart|middle|base|$)/i, heart:/(?:heart|middle)[^<]{0,40}notes?[\s\S]{0,1200}?(?=base|$)/i, base:/(?:base|fond)[^<]{0,40}notes?[\s\S]{0,1200}/i };
    const chunk = (html.match(chunkMap[type])||[""])[0];
    names = [...chunk.matchAll(/alt="([^"]{2,40})"/g)].map(m=>m[1]).filter(a=>!/logo|icon|parfumo|basenotes/i.test(a));
  }
  return toNoteTuples(names);
}

function toNoteTuples(names) {
  const u = [...new Set(names.map(n=>n[0].toUpperCase()+n.slice(1).toLowerCase()).filter(n=>n.length>1))].slice(0,8);
  return u.map((n,i)=>({ name:n, pct:Math.round(90-i*(55/Math.max(u.length-1,1))) }));
}

// ── ATTRIBUTE EXTRACTORS ─────────────────────────────────────────────────────
function extractGender(html) {
  if (/for women and men|unisex|mixte/i.test(html)) return "Unisex";
  if (/pour femme|for women|feminine|damen/i.test(html)) return "Femenino";
  if (/pour homme|for men|masculine|herren/i.test(html)) return "Masculino";
  return "Unisex";
}
function extractSeason(html) {
  const s=[];
  if (/spring|Frühling/i.test(html))   s.push("🌸 Primavera");
  if (/summer|Sommer/i.test(html))     s.push("☀️ Verano");
  if (/fall|autumn|Herbst/i.test(html))s.push("🍂 Otoño");
  if (/winter|Winter/i.test(html))     s.push("❄️ Invierno");
  return s.length ? s : ["🌍 Todo el año"];
}
function extractTime(html) {
  const t=[];
  if (/\bday\b|daytime|Tagsüber/i.test(html))   t.push("🌤 Diurno");
  if (/night|evening|Abend|Nacht/i.test(html))   t.push("🌙 Nocturno");
  return t.length ? t : ["🌤 Diurno","🌙 Nocturno"];
}
function ratingFromJson(html, kw) {
  const m = html.match(new RegExp(`"${kw}"\\s*:\\s*\\{[^}]*"value"\\s*:\\s*(\\d+\\.?\\d*)`, "i"));
  if (m) { const v=parseFloat(m[1]); if(v>=1&&v<=5)return Math.round(v); }
  return 0;
}
function ratingNearWord(html, kw) {
  const m = html.match(new RegExp(`(?:${kw})[^<]{0,80}?(\\d+(?:[.,]\\d+)?)\\s*(?:/\\s*(?:5|10))?`, "i"));
  if (m) { const v=parseFloat(m[1].replace(",",".")); if(v>=1&&v<=5)return Math.round(v); if(v>5&&v<=10)return Math.round(v/2); }
  return 0;
}

// ── PRICES ────────────────────────────────────────────────────────────────────
function buildPrices(name, brand) {
  const q = enc(`${brand} ${name}`.trim());
  return [
    {r:"🌸 Douglas",         u:`https://www.douglas.es/es/search?q=${q}`},
    {r:"🏬 El Corte Inglés", u:`https://www.elcorteingles.es/search/?s=${q}`},
    {r:"🖤 Sephora",         u:`https://www.sephora.es/search?q=${q}`},
    {r:"💼 Druni",           u:`https://www.druni.es/catalogsearch/result/?q=${q}`},
    {r:"📦 Amazon.es",       u:`https://www.amazon.es/s?k=${q}&i=beauty`},
    {r:"🧴 Arenal",          u:`https://www.perfumeriasarenal.com/busqueda?q=${q}`},
    {r:"✨ Primor",          u:`https://www.primor.eu/es/search?q=${q}`},
  ];
}

// ── OCR ───────────────────────────────────────────────────────────────────────
async function handlePhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const src = ev.target.result;
    document.getElementById("photo-zone").innerHTML = `
      <div class="preview-row">
        <img src="${src}" alt="preview"/>
        <span id="ocr-st">Leyendo etiqueta…</span>
        <button class="x-btn" onclick="clearPhoto()">×</button>
      </div>`;
    if (!window.Tesseract) {
      await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);}).catch(()=>null);
    }
    if (window.Tesseract) {
      try {
        const w = await Tesseract.createWorker("eng+spa",1,{logger:()=>{}});
        const {data:{text}} = await w.recognize(src);
        await w.terminate();
        const best = text.split("\n").map(l=>l.trim()).filter(l=>l.length>2&&/[a-zA-ZÀ-ÿ]/.test(l)).sort((a,b)=>b.length-a.length)[0]||"";
        if (best) { document.getElementById("q").value=best; document.getElementById("ocr-st").textContent="✓ "+best; }
        else document.getElementById("ocr-st").textContent="Escribe el nombre manualmente";
      } catch { document.getElementById("ocr-st").textContent="Escribe el nombre manualmente"; }
    }
  };
  reader.readAsDataURL(file);
}
function clearPhoto() {
  document.getElementById("fi").value="";
  document.getElementById("photo-zone").innerHTML=`<button class="photo-btn" onclick="document.getElementById('fi').click()"><span style="font-size:22px">📷</span> FOTOGRAFIAR BOTELLA</button><p class="photo-note">Apunta la cámara a la etiqueta del perfume</p>`;
}

// ── MAIN SEARCH ───────────────────────────────────────────────────────────────
async function go() {
  const q = document.getElementById("q").value.trim();
  if (!q) { showErr("Escribe el nombre de un perfume."); return; }
  document.getElementById("err").style.display="none";
  document.getElementById("results").style.display="none";
  document.getElementById("loading").style.display="block";
  document.getElementById("sbtn").disabled=true;

  let perfume = null;
  let lastErr = "";

  for (const src of SOURCES) {
    try {
      setStep(`Buscando en ${src.name}…`);
      const searchHtml = await proxyGet(src.search(q));
      const perfUrl = src.findUrl(searchHtml);
      if (!perfUrl) { lastErr=`Sin resultados en ${src.name}`; continue; }
      setStep(`Cargando ficha de ${src.name}…`);
      const perfHtml = await proxyGet(perfUrl);
      perfume = src.parse(perfHtml, perfUrl);
      if (perfume?.name) break; // success!
    } catch(e) {
      lastErr = `${src.name}: ${e.message}`;
      console.warn(lastErr);
    }
  }

  document.getElementById("sbtn").disabled=false;
  document.getElementById("loading").style.display="none";

  if (!perfume?.name) {
    showErr(`No encontrado en ninguna fuente.<br><small>Prueba: marca + nombre (ej: "Dior Sauvage")<br>${lastErr}</small>`);
    return;
  }
  render(perfume);
}

function setStep(t){document.getElementById("step").textContent=t;}
function showErr(m){const e=document.getElementById("err");e.innerHTML=m;e.style.display="block";}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(p) {
  document.getElementById("source-badge").textContent="✦ "+p.source.toUpperCase();
  document.getElementById("bottle").innerHTML = p.imgUrl
    ? `<img src="${p.imgUrl}" alt="${p.name}" crossorigin="anonymous" onerror="this.parentNode.innerHTML='<span class=ph>🫙</span>'">`
    : '<span class="ph">🫙</span>';
  document.getElementById("brand-line").textContent = (p.brand||"").toUpperCase()+(p.year?" · "+p.year:"");
  document.getElementById("pname").textContent = p.name||"";
  document.getElementById("pdesc").textContent = (p.desc||"").slice(0,250);
  document.getElementById("frag-link").href = p.url||"#";

  const tagsEl=document.getElementById("tags"); tagsEl.innerHTML="";
  [p.gender,...(p.season||[]),...(p.timeDay||[])].filter(Boolean).forEach(t=>{
    const s=document.createElement("span");s.className="tag";s.textContent=t.toUpperCase();tagsEl.appendChild(s);
  });

  mkDots("d-lon",p.longevity); mkDots("d-sil",p.sillage); mkDots("d-int",p.intensity);
  mkNotes("n-top",p.topNotes); mkNotes("n-heart",p.heartNotes); mkNotes("n-base",p.baseNotes);

  const pl=document.getElementById("plist"); pl.innerHTML="";
  buildPrices(p.name,p.brand).forEach(pr=>{
    pl.innerHTML+=`<a class="pitem" href="${pr.u}" target="_blank" rel="noopener">
      <div><div class="p-name">${pr.r}</div><div class="p-note">Buscar "${p.name}"</div></div>
      <span class="parr">↗</span></a>`;
  });

  document.getElementById("results").style.display="block";
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));
  document.querySelector(".tab").classList.add("on");
  document.getElementById("tab-pyr").classList.add("on");
  setTimeout(()=>document.querySelectorAll(".nfill").forEach(b=>{b.style.width=b.dataset.p+"%";}),200);
  window.scrollTo({top:0,behavior:"smooth"});
}

function mkDots(id,val){const el=document.getElementById(id);el.innerHTML="";for(let i=0;i<5;i++){const d=document.createElement("div");d.className="dot"+(i<val?" on":"");el.appendChild(d);}}
function mkNotes(id,notes){const el=document.getElementById(id);el.innerHTML="";if(!notes?.length){el.innerHTML='<p class="empty-note">No disponible</p>';return;}notes.forEach(n=>{el.innerHTML+=`<div class="nbar"><div class="nbar-top"><span class="nname">${n.name}</span><span class="npct">${n.pct}%</span></div><div class="ntrack"><div class="nfill" data-p="${n.pct}"></div></div></div>`;});}
function swTab(id,btn){document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));btn.classList.add("on");document.getElementById("tab-"+id).classList.add("on");if(id==="pyr")setTimeout(()=>document.querySelectorAll(".nfill").forEach(b=>{b.style.width=b.dataset.p+"%";}),80);}
</script>
